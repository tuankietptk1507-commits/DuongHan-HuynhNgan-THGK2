
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Diamond Ring Animation</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:Arial;
}

.container{
position:relative;
width:420px;
height:420px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
}

.ring{
position:absolute;
width:100%;
opacity:0;
transition:opacity 1s ease-in-out;
}

.ring.active{
opacity:1;
}

.text{
position:absolute;
bottom:10px;
color:white;
font-size:28px;
letter-spacing:5px;
text-align:center;
width:100%;
}

.glow{
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#ffffff55,transparent);
filter:blur(60px);
animation:light 3s infinite alternate;
}

@keyframes light{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

</style>
</head>

<body>

<div class="container" onclick="changeRing()">

<div class="glow"></div>

<img class="ring active" src="./img/ring-1-removebg-preview.png">
<img class="ring" src="./img/ring-2-removebg-preview.png">
<img class="ring" src="./img/ring-3-removebg-preview.png">
<img class="ring" src="./img/ring-4-removebg-preview.png">

<div class="text">SHINE FOREVER</div>

</div>

<script>

let index = 0
const rings = document.querySelectorAll(".ring")

function changeRing(){

rings[index].classList.remove("active")

index++

if(index >= rings.length){
index = 0
}

rings[index].classList.add("active")

}

</script>

</body>
</html>
